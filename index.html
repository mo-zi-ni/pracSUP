<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>레이드 패턴 연습장</title>
  </head>
  <body>
    <div id="app">
      <canvas id="stage"></canvas>

      <header id="topbar">
        <div class="pattern-info">
          <h1 id="pattern-name">—</h1>
          <p id="pattern-desc"></p>
        </div>
        <div class="controls">
          <select id="pattern-select" aria-label="패턴 선택"></select>
          <label class="speed">
            속도
            <input id="speed" type="range" min="25" max="100" step="5" value="100" />
            <output id="speed-out">100%</output>
          </label>
          <label class="toggle">
            <input id="cue" type="checkbox" checked />
            느낌표 안내
          </label>
          <button id="pause" type="button">일시정지 (P)</button>
          <button id="restart" type="button">다시 (R)</button>
        </div>
      </header>

      <div id="timeline"><div id="timeline-fill"></div></div>

      <div id="callout"></div>
      <div id="feedback"></div>

      <footer id="bottombar">
        <div class="stat">
          <span class="stat-label">체력</span>
          <div id="hp"></div>
        </div>
        <div class="stat">
          <span class="stat-label">대시</span>
          <div id="dash"><div id="dash-fill"></div></div>
        </div>
        <div class="stat">
          <span class="stat-label">가드</span>
          <div id="guard"><div id="guard-fill"></div></div>
          <span id="guard-state">준비</span>
        </div>
        <p class="hint">우클릭 이동 · WASD · Space 커서 방향 대시(무적) · G 방어 자세(0.5초) · P 일시정지 · R 재시작</p>
      </footer>

      <div id="paused" class="hidden">
        <h2>일시정지</h2>
        <p>P 또는 Esc로 계속 · 아래에서 연습할 모드를 고를 수 있습니다</p>
        <div id="paused-modes"></div>
      </div>

      <div id="result" class="hidden">
        <h2 id="result-title"></h2>
        <p id="result-detail"></p>
        <button id="result-retry" type="button">다시 시도</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
